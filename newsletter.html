<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for joining the PurpleWave newsletter.">
    <title>Welcome to the Wave - PurpleWave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="js/global-navbar.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0115;
            color: #f3e8ff;
        }
        .text-gradient {
            background: linear-gradient(to right, #d8b4fe, #e879f9, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(232, 121, 249, 0.2));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body class="antialiased overflow-hidden min-h-screen flex flex-col">
    <global-navbar></global-navbar>

    <main class="flex-grow flex items-center justify-center relative px-4 pt-20">
        <div class="blob top-[-10%] left-[-10%] animate-pulse"></div>
        <div class="blob bottom-[-10%] right-[-10%] animate-pulse" style="animation-delay: 2s;"></div>

        <div class="glass-panel max-w-2xl w-full rounded-3xl p-12 text-center shadow-2xl relative z-10">
            <div class="w-24 h-24 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-8 rotate-3 shadow-lg shadow-purple-500/20">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight">
                <span class="text-gradient">Welcome to the Wave</span>
            </h1>
            
            <p class="text-xl text-purple-200/80 mb-10 leading-relaxed font-light">
                We're thrilled to have you with us. Your journey towards exceptional digital experiences starts here. 
                Expect the latest trends, exclusive insights, and agency updates directly in your inbox.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="index.html" class="px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl transition duration-300 shadow-lg shadow-purple-900/50">
                    Back to Home
                </a>
                <a href="blog.html" class="px-8 py-4 border border-purple-500/30 text-white font-bold rounded-xl hover:bg-purple-500/10 transition backdrop-blur-sm">
                    Read Our Blog
                </a>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-purple-400/50 text-sm">
        © <span id="year"></span> PurpleWave. All rights reserved.
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
