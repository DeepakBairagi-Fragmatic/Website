<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            color: #f3e8ff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .text-gradient {
            background: linear-gradient(to right, #d8b4fe, #e879f9, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4">
    <div class="glass-panel rounded-2xl p-6 max-w-sm mx-auto shadow-xl">
        <h3 class="text-xl font-bold text-white mb-2">Stay Updated</h3>
        <p class="text-purple-300/70 text-xs mb-4">Subscribe to our newsletter for the latest design trends and agency news.</p>
        <form id="newsletterForm" class="space-y-4">
            <div>
                <input type="email" id="email" required
                    class="w-full bg-[#0b0115]/50 border border-purple-700/50 rounded-lg px-3 py-2 text-white text-sm focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none transition placeholder-purple-700"
                    placeholder="your@email.com" />
            </div>
            <button type="submit" id="submitBtn"
                class="w-full py-2 rounded-lg bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold text-sm shadow-lg hover:scale-[1.02] transition duration-300">
                Subscribe Now
            </button>
        </form>
        <div id="successMsg" class="hidden mt-4 p-2 bg-green-900/30 border border-green-500/50 rounded-lg text-center">
            <p class="text-green-400 text-xs font-semibold">Thanks for subscribing! 🚀</p>
        </div>
    </div>

    <script>
        document.getElementById('newsletterForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('newsletterForm');
            const success = document.getElementById('successMsg');
            
            btn.disabled = true;
            btn.textContent = '...';
            
            setTimeout(() => {
                form.classList.add('hidden');
                success.classList.remove('hidden');
                // Redirect parent window to newsletter page
                setTimeout(() => {
                    window.top.location.href = 'newsletter.html';
                }, 1500);
            }, 1000);
        });
    </script>
</body>
</html>
